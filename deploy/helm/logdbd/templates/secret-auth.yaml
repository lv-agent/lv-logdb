{{- /* Generate an auth-token Secret only when a plaintext token is supplied
      and no existing Secret is referenced. Prefer pre-provisioned Secrets. */ -}}
{{- if and .Values.server.auth.token (not .Values.server.auth.secretName) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "logdbd.authSecretName" . }}
  labels:
    {{- include "logdbd.labels" . | nindent 4 }}
type: Opaque
stringData:
  token: {{ .Values.server.auth.token | quote }}
{{- end }}
