syntax = "proto3";
package logdbd;

service LogDbService {
  rpc Append(AppendRequest) returns (AppendResponse);
  rpc BatchAppend(BatchAppendRequest) returns (AppendBatchResponse);
  rpc Read(ReadRequest) returns (ReadResponse);
  rpc Scan(ScanRequest) returns (stream ScanResponse);
  rpc Tail(TailRequest) returns (stream TailResponse);
  rpc Checkpoint(CheckpointRequest) returns (CheckpointResponse);
  rpc Status(StatusRequest) returns (StatusResponse);
  rpc GetWatermark(GetWatermarkRequest) returns (Watermark);
  rpc VerifyChain(VerifyChainRequest) returns (VerifyChainResponse);

  // Consumer group — server-side offset tracking
  rpc CommitOffset(CommitOffsetRequest) returns (CommitOffsetResponse);
  rpc GetCommittedOffset(GetCommittedOffsetRequest) returns (GetCommittedOffsetResponse);

  // Catalog — namespace & stream management
  rpc ListNamespaces(ListNamespacesRequest) returns (ListNamespacesResponse);
  rpc ListStreams(ListStreamsRequest) returns (ListStreamsResponse);

  // Management API — stream lifecycle + quota
  rpc CreateStream(CreateStreamRequest) returns (CreateStreamResponse);
  rpc DeleteStream(DeleteStreamRequest) returns (DeleteStreamResponse);

  // Query — native structured filter against the log segment
  rpc Query(QueryRequest) returns (QueryResponse);

  // Subscribe — real-time event-type push with consumer-group offset tracking
  rpc Subscribe(SubscribeRequest) returns (stream Record);
}

// ─── Record (full logdbd record) ─────────────────────────────────────────

message Record {
  uint32 namespace_id      = 1;
  uint64 stream_id         = 2;
  uint64 seq               = 3;
  string event_type        = 4;
  uint64 timestamp_ns      = 5;
  string content_type      = 6;
  map<string, string> metadata = 7;
  bytes  content           = 8;
}

// ─── Write ───────────────────────────────────────────────────────────────

message AppendRequest {
  string namespace    = 1;
  string stream       = 2;
  string event_type   = 3;
  uint64 timestamp_ns = 4;
  string content_type = 5;
  map<string, string> metadata = 6;
  bytes  content      = 7;
}

message AppendResponse {
  uint32 namespace_id  = 1;
  uint64 stream_id     = 2;
  uint64 seq           = 3;
  uint64 gid           = 4;  // logdb internal gid (opaque to caller)
}

message BatchAppendRequest {
  repeated AppendRequest requests = 1;
}

message AppendBatchResponse {
  repeated AppendResponse records = 1;
  Error error = 2;
}

message Error {
  string code    = 1;
  string message = 2;
  bool   retryable = 3;
}

// ─── Read ────────────────────────────────────────────────────────────────

message ReadRequest {
  string namespace = 1;
  string stream    = 2;
  uint64 seq       = 3;
}

message ReadResponse {
  Record record = 1;
  bool   found  = 2;
}

message ScanRequest {
  string namespace = 1;
  string stream    = 2;
  uint64 from_seq  = 3;
  uint64 to_seq    = 4;  // 0 = durable tail
  uint32 limit     = 5;
}

message ScanResponse {
  repeated Record records = 1;
  uint64 next_seq         = 2;
  bool   has_more         = 3;
}

message TailRequest {
  string namespace       = 1;
  string stream          = 2;
  uint64 from_seq        = 3;
  uint32 batch_size      = 4;
  string consumer_group  = 5;  // consumer group name (for shared offset tracking)
  string consumer_id     = 6;  // unique consumer ID within the group
}

message TailResponse {
  repeated Record records  = 1;
  uint64 durable_seq       = 2;
  bool   heartbeat         = 3;
}

// ─── Watermark ───────────────────────────────────────────────────────────

message GetWatermarkRequest {
  string namespace = 1;  // required
  string stream    = 2;  // optional
}

message Watermark {
  string namespace       = 1;
  string stream          = 2;
  uint64 oldest_seq      = 3;
  uint64 durable_seq     = 4;
  uint64 replicated_seq  = 5;
  string node_id         = 6;
  string role            = 7;
}

// ─── Admin ───────────────────────────────────────────────────────────────

message CheckpointRequest {
  uint64 sequence = 1;
}

message CheckpointResponse {}

message StatusRequest {}

message StatusResponse {
  uint64 durable_sequence = 1;
  uint64 checkpoint = 2;
  uint64 wal_bytes_used = 3;
  uint64 wal_bytes_total = 4;
  string node_id = 5;
  string role = 6;
}

// ─── VerifyChain ─────────────────────────────────────────────────────────

message VerifyChainRequest {
  string namespace = 1;
  string stream    = 2;
  uint64 from_seq  = 3;
  uint64 to_seq    = 4;  // 0 = durable tail
}

message VerifyChainResponse {
  bool   ok              = 1;
  uint64 verified_from   = 2;
  uint64 verified_to     = 3;
  uint64 error_at_seq    = 4;
  string error_message   = 5;
}

// ─── Consumer offset tracking ────────────────────────────────────────────

message CommitOffsetRequest {
  string namespace       = 1;
  string stream          = 2;
  string consumer_group  = 3;
  string consumer_id     = 4;
  uint64 committed_seq   = 5;  // last successfully processed seq
}

message CommitOffsetResponse {
  bool   ok      = 1;
  string message = 2;
}

// Resolve the committed offset for a consumer
message GetCommittedOffsetRequest {
  string namespace       = 1;
  string stream          = 2;
  string consumer_group  = 3;
  string consumer_id     = 4;
}

message GetCommittedOffsetResponse {
  uint64 committed_seq = 1;  // 0 = no offset committed yet
}

// Internal replication service (primary → standby).
// Transfers raw encoded bytes — independent of the public Record schema.
service ReplicationService {
  rpc Sync(ReplicationRequest) returns (ReplicationResponse);
}

message ReplicationRecord {
  uint64 gid          = 1;  // logdb global id (preserved on standby)
  uint64 timestamp_ns = 2;
  bytes  content      = 3;  // raw encoded logdbd record (header + user_content)
}

message ReplicationRequest {
  string cluster_id     = 1;
  uint64 epoch          = 2;
  repeated ReplicationRecord records = 3;
}

message ReplicationResponse {
  uint64 last_gid = 1;  // highest gid applied
}

// ─── Snapshot service (primary → standby full sync) ──────────────────────────

service SnapshotService {
  // Standby requests a snapshot; primary streams segment files.
  rpc PullSnapshot(SnapshotRequest) returns (stream SnapshotChunk);
}

message SnapshotRequest {
  string cluster_id = 1;
  uint64 epoch      = 2;
}

message SnapshotChunk {
  string file_name = 1;   // e.g. "segment-00000001.log"
  uint64 offset    = 2;   // byte offset within file
  bytes  data      = 3;   // chunk payload
  bool   last      = 4;   // true if this is the last chunk of the snapshot
}

// ─── Catalog messages ───────────────────────────────────────────────────────

message ListNamespacesRequest {}

message NamespaceInfo {
  string name = 1;
  uint32 id   = 2;
  uint64 stream_count = 3;
}

message ListNamespacesResponse {
  repeated NamespaceInfo namespaces = 1;
}

message ListStreamsRequest {
  string namespace = 1;
}

message StreamInfo {
  string name         = 1;
  uint64 id           = 2;
  uint64 first_seq    = 3;
  uint64 durable_seq  = 4;
  uint64 record_count = 5;
}

message ListStreamsResponse {
  repeated StreamInfo streams = 1;
}

// ─── Query (native structured filter engine) ──────────────────────────────
// Reads the log segment directly at the committed cursor (no SQLite cache).
// See veps/cr-027-native-query-engine.md ("读边界").
message QueryRequest {
  string namespace = 1;
  string stream    = 2;
  // Predicates (all AND-combined).
  repeated string event_types    = 3;   // IN filter on event_type (empty = all).
  optional uint64 from_seq       = 4;   // seq >= (inclusive). Absent = no lower bound.
  optional uint64 to_seq         = 5;   // seq <= (inclusive). Absent = no upper bound.
  repeated MetadataFilter metadata = 6; // Equality on metadata fields.
  // Result shape.
  QueryResult result          = 7;      // Defaults to RECORDS (=0).
  string aggregate_field      = 8;      // COUNT_DISTINCT/MIN/MAX/DISTINCT_VALUES target. "" = use seq.
  // Anti-join (NOT EXISTS): drop filtered records whose join_key value also
  // appears on a record matching peer_event_types.
  AbsentMatch absent          = 9;
  // Paging / order.
  int32 limit                  = 10;    // 0 = unlimited. Ignored for aggregations.
  bool   descending            = 11;    // Order records/values by seq descending.
}
message MetadataFilter {
  string key   = 1;
  string value = 2;
}
message AbsentMatch {
  repeated string peer_event_types = 1;  // Event types that "complete" a group (e.g. turn_completed).
  string join_key                  = 2;  // Metadata field joining candidates to peers (e.g. turn_id).
}
enum QueryResult {
  RECORDS         = 0;
  COUNT           = 1;
  COUNT_DISTINCT  = 2;
  MIN             = 3;
  MAX             = 4;
  EXISTS          = 5;
  DISTINCT_VALUES = 6;
}
message QueryResponse {
  oneof result {
    RecordsResult        records         = 1;
    uint64               count           = 2;
    bool                 exists          = 3;
    uint64               count_distinct  = 4;
    uint64               min             = 5;
    uint64               max             = 6;
    DistinctValuesResult distinct_values = 7;
  }
}
message RecordsResult {
  repeated Record records = 1;
}
message DistinctValuesResult {
  repeated string values = 1;
}

// ─── Subscribe (event-type push) ──────────────────────────────────────────

message SubscribeRequest {
  string namespace       = 1;
  string stream          = 2;
  repeated string event_types = 3;  // subscribe to these event types
  string consumer_group  = 4;       // for offset tracking
  string consumer_id     = 5;       // unique consumer within group
}

// ─── Management API ──────────────────────────────────────────────────────

message CreateStreamRequest {
  string namespace = 1;
  string stream    = 2;
  // Optional quota settings
  uint64 max_records = 3;  // 0 = unlimited
  uint64 max_bytes   = 4;  // 0 = unlimited
}

message CreateStreamResponse {
  uint32 namespace_id = 1;
  uint64 stream_id    = 2;
  bool   created      = 3;  // false if already existed
}

message DeleteStreamRequest {
  string namespace = 1;
  string stream    = 2;
}

message DeleteStreamResponse {
  bool   deleted = 1;
  uint64 deleted_count = 2;  // number of records marked deleted
}
