name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  logdb:
    name: logdb — build + test (${{ matrix.features }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # '' = default features; each feature is exercised on its own, plus the
        # full combination. The library gates several scan/recovery tests
        # behind individual features.
        features:
          - ''
          - '--all-features'
          - '--features testing'
          - '--features compression'
          - '--features encryption'
          - '--features hash-chain'
          - '--features remote-push'
          - '--features tracing'
          - '--features metrics'
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build -p logdb ${{ matrix.features }}
      - run: cargo test -p logdb ${{ matrix.features }}

  msrv:
    # Enforce the declared MSRV (rust-version in logdb/Cargo.toml). cargo 1.85
    # reads the v4 lock natively, so no lock-regeneration hack is needed.
    name: MSRV 1.85 (logdb build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.85.0
      - uses: Swatinem/rust-cache@v2
      - run: cargo build -p logdb --all-features
      - run: cargo build -p logdbd

  logdbd:
    name: logdbd — build + test (needs protoc)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - run: cargo build -p logdbd
      - run: cargo test -p logdbd

  clippy:
    name: clippy (workspace, non-blocking)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      # Run without -D warnings: surface lints across both crates without
      # failing the pipeline.
      - run: cargo clippy --workspace --all-features

  licenses:
    name: cargo-deny (licenses, non-blocking)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # Enforce the permissive license allow-list in deny.toml. A copyleft
      # (GPL/AGPL/LGPL/MPL) or unknown-license dependency fails this job.
      - run: cargo install cargo-deny --locked
      - run: cargo deny check licenses
