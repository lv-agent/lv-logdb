# logdb-broker sample configuration.
#
# Distributed (external logdbd):
#   LOGDB_BROKER_CONFIG=./logdb-broker/config.yaml cargo run -p logdb-broker
#
# Single-process (embedded logdbd):
#   Set `embedded: true` — the broker starts its own logdbd in-process
#   (no external logdbd needed).  For development / single-binary deployments.
#
# The broker is the symmetric gateway (cr-037). `num_shards` MUST match
# logdbd's `shards` config (the broker assigns these round-robin).

# gRPC port producers/consumers connect to.
bind_addr: "0.0.0.0:9091"

# logdbd storage backend.  When `embedded: true` this is the bind address
# for the in-process logdbd — "127.0.0.1:0" picks a free port.
logdbd_addr: "http://logdbd:50051"

# Start an embedded in-process logdbd (single-binary mode).
embedded: false
# data_dir: "./data"   # only used when embedded: true

# Must equal logdbd's `shards`.
num_shards: 4

# Optional Prometheus scrape endpoint (/metrics). Drop this line to disable.
metrics_addr: "0.0.0.0:9100"
