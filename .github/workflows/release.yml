name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'

env:
  CARGO_TERM_COLOR: always

jobs:
  build-linux:
    name: Build Linux x86_64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - name: Build release
        run: cargo build --release -p logdbd -p logdb-exporter
      - name: Package
        run: |
          cd target/release
          tar czf logdbd-${{ github.ref_name }}-x86_64-linux.tar.gz \
            logdbd logdbd-admin logdb-exporter
          sha256sum logdbd-${{ github.ref_name }}-x86_64-linux.tar.gz \
            > logdbd-${{ github.ref_name }}-x86_64-linux.tar.gz.sha256
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-binaries
          path: |
            target/release/logdbd-*.tar.gz
            target/release/logdbd-*.tar.gz.sha256

  create-release:
    name: Create GitHub Release
    needs: build-linux
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: linux-binaries
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: logdbd ${{ github.ref_name }}
          generate_release_notes: true
          files: logdbd-*.tar.gz*
